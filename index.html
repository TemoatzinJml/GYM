<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0A0E17">
<title>FORJA · Entrenamiento Diario</title>
<style>
/* ===================== VARIABLES / TEMA ===================== */
:root{
  --bg:#0A0E17;
  --card:#131A2B;
  --card-alpha:rgba(19,26,43,.85);
  --accent1:#FF6B35; /* naranja */
  --accent2:#00D4FF; /* cian */
  --accent3:#7B2FBE; /* purpura */
  --success:#00E676;
  --danger:#FF1744;
  --text:#FFFFFF;
  --text2:#B0BEC5;
  --border:rgba(0,212,255,.15);
  --glow:rgba(0,212,255,.15);
  --grad:linear-gradient(135deg,var(--accent1),var(--accent3));
  --radius:18px;
  --radius-sm:10px;
  --font-scale:1;
  --safe-t:env(safe-area-inset-top);
  --safe-b:env(safe-area-inset-bottom);
  --safe-l:env(safe-area-inset-left);
  --safe-r:env(safe-area-inset-right);
  color-scheme:dark;
}
[data-theme="claro"]{
  --bg:#F2F4F8;
  --card:#FFFFFF;
  --card-alpha:rgba(255,255,255,.85);
  --text:#12151C;
  --text2:#5B6672;
  --border:rgba(123,47,190,.15);
  --glow:rgba(123,47,190,.12);
  color-scheme:light;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;
  font-size:calc(16px * var(--font-scale));
  overscroll-behavior-y:contain;
  min-height:100dvh;
  padding-top:var(--safe-t);
  padding-bottom:var(--safe-b);
  padding-left:var(--safe-l);
  padding-right:var(--safe-r);
  transition:background .3s,color .3s;
}
button,input,select,textarea{font-family:inherit; color:inherit;}
button{cursor:pointer; -webkit-appearance:none; appearance:none; border:none; background:none;}
::-webkit-scrollbar{display:none;}
.svg-icon{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.svg-icon.sz-32{width:32px;height:32px;}
.svg-icon.sz-48{width:48px;height:48px;}
.svg-icon.filled{fill:currentColor;stroke:none;}
.glow{filter:drop-shadow(0 0 6px var(--glow));}
.spin-slow{animation:spin 3s linear infinite;}
.bounce{animation:bounce 1s ease-in-out infinite;}
.pulse{animation:pulse 1.4s ease-in-out infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}

/* ===================== LAYOUT APP ===================== */
#app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;}
header.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;position:sticky;top:0;z-index:40;
  background:var(--card-alpha);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.5px;font-size:1.05rem;}
.brand .lg{width:34px;height:34px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;}
.brand .lg svg{width:20px;height:20px;stroke:#fff;}
.streak-badge{
  display:flex;align-items:center;gap:6px;background:rgba(255,107,53,.12);
  border:1px solid rgba(255,107,53,.4);padding:6px 12px;border-radius:999px;font-weight:700;
}
.streak-badge svg{stroke:var(--accent1);width:18px;height:18px;}
.icon-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;}
.icon-btn:active{background:rgba(255,255,255,.06);}
main{flex:1;padding:16px 16px calc(96px + var(--safe-b));overflow-x:hidden;}
.view{display:none;animation:fadein .25s ease;}
.view.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* Tarjetas */
.card{
  background:var(--card-alpha);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}
.card h3{margin:0 0 12px;font-size:.95rem;letter-spacing:.3px;color:var(--text2);text-transform:uppercase;font-weight:700;}
.grad-header{background:var(--grad);border-radius:var(--radius);padding:20px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden;}

/* Nav inferior */
nav.tabbar{
  position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;
  display:flex;justify-content:space-around;
  background:var(--card-alpha);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);padding:8px calc(4px + var(--safe-l)) calc(8px + var(--safe-b));
  z-index:50;
}
nav.tabbar button{
  display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);
  min-width:44px;min-height:44px;padding:4px 8px;border-radius:12px;font-size:.62rem;font-weight:600;
  transition:color .2s;
}
nav.tabbar button.active{color:var(--accent2);}
nav.tabbar button svg{width:22px;height:22px;}

/* Botones */
.btn{
  min-height:48px;padding:0 20px;border-radius:14px;font-weight:700;font-size:.95rem;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s, opacity .15s;
}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 6px 20px rgba(255,107,53,.3);}
.btn-outline{border:1.5px solid var(--border);color:var(--text);background:transparent;}
.btn-ghost{color:var(--accent2);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{min-height:36px;padding:0 14px;font-size:.82rem;border-radius:10px;}
.btn-block{width:100%;}
.btn-icon-circle{width:80px;height:80px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 26px rgba(255,107,53,.35);position:relative;}
.btn-icon-circle svg{width:34px;height:34px;stroke:#fff;}

/* Inputs */
.field{margin-bottom:14px;}
.field label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:6px;font-weight:600;}
.field input[type=text],.field input[type=number],.field input[type=time],.field select,.field textarea{
  width:100%;min-height:48px;background:rgba(255,255,255,.04);border:1.5px solid var(--border);
  border-radius:12px;padding:10px 14px;font-size:1rem;color:var(--text);
}
[data-theme="claro"] .field input,[data-theme="claro"] .field select,[data-theme="claro"] .field textarea{background:rgba(0,0,0,.03);}
.field textarea{min-height:80px;resize:vertical;}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.switch{width:48px;height:28px;border-radius:999px;background:rgba(255,255,255,.12);position:relative;flex-shrink:0;transition:background .25s;}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .25s;}
.switch.on{background:var(--grad);}
.switch.on::after{transform:translateX(20px);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.show{display:flex;}
.modal{background:var(--card);width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:20px 18px calc(20px + var(--safe-b));max-height:88dvh;overflow-y:auto;animation:slideup .3s ease;border:1px solid var(--border);border-bottom:none;}
@keyframes slideup{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-handle{width:40px;height:4px;background:var(--text2);opacity:.4;border-radius:99px;margin:0 auto 14px;}
.modal h2{margin:0 0 16px;font-size:1.15rem;}

/* Toast */
#toast-wrap{position:fixed;bottom:calc(90px + var(--safe-b));left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none;}
.toast{background:var(--card);border:1px solid var(--accent2);border-radius:14px;padding:12px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.4);animation:toastin .35s ease;max-width:90%;}
@keyframes toastin{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.toast svg{stroke:var(--accent3);width:26px;height:26px;flex-shrink:0;}

/* utilidades */
.row{display:flex;align-items:center;gap:10px;}
.between{justify-content:space-between;}
.wrap{flex-wrap:wrap;}
.muted{color:var(--text2);}
.small{font-size:.8rem;}
.center{text-align:center;}
.mt8{margin-top:8px;}.mt16{margin-top:16px;}.mb0{margin-bottom:0;}
.hidden{display:none !important;}
.chip{padding:6px 14px;border-radius:999px;font-size:.78rem;font-weight:600;border:1.5px solid var(--border);color:var(--text2);}
.chip.active{background:var(--grad);color:#fff;border-color:transparent;}
.badge-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
</style>
</head>

<script>
/* ===================== NUCLEO: ESTADO Y PERSISTENCIA ===================== */

const todayStr = (d=new Date())=>{

function diaMax(s,fn){ return Object.values(s.registros).reduce((m,r)=>Math.max(m,fn(r)||0),0); }
function totalCaloriasMesActual(s){
  const n=new Date();
  return Object.entries(s.registros).filter(([f])=>{const d=new Date(f); return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth();})
    .reduce((a,[,r])=>a+(r.caloriasTotales||0),0);
}
function sumaRepsPorIcono(s,icono){
  const ids = state.ejercicios.filter(e=>e.icono===icono).map(e=>e.id);
  let total=0;
  Object.values(s.registros).forEach(r=>r.ejercicios.forEach(e=>{ if(ids.includes(e.id)) total+=(e.reps||0); }));
  return total;
}

function defaultState(){
  return {
    version:"1.0",
    peso:75,
    ejercicios: defaultExercises(),
    registros: {},
    racha: { actual:0, maxima:0, ultimaFecha:null, diasGracia:1 },
    logros: [],
    config:{
      tema:"oscuro", fontSize:"medio", sonidos:true, vibracion:true,
      formatoFecha:"DD/MM/YYYY", unidadPeso:"kg",
      metaCalorias:200, metaEjercicios:8, metaDiasSemana:5, recordatorioHora:""
    },
    respaldos:[],
    rutinaOrden: [],
    modoEstructurado:false
  };
}

let state = loadState();
migrarEjerciciosDeporte();
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed, {config:Object.assign(defaultState().config, parsed.config||{})});
  }catch(e){ return defaultState(); }
}
function migrarEjerciciosDeporte(){
  if(state.config.deportesAppleAgregados) return;
  const nombresExistentes = new Set(state.ejercicios.map(e=>e.nombre));
  const nuevos = buildSportExercises().filter(e=>!nombresExistentes.has(e.nombre));
  state.ejercicios = state.ejercicios.concat(nuevos);
  state.ejercicios.forEach(e=>{ if(e.duracionCronometro===undefined) e.duracionCronometro = 60; });
  state.config.deportesAppleAgregados = true;
  saveState();
}
function saveState(hacerRespaldo=false){
  if(hacerRespaldo){
    state.respaldos.unshift({fecha:new Date().toISOString(), datos: JSON.parse(JSON.stringify({registros:state.registros, racha:state.racha}))});
    state.respaldos = state.respaldos.slice(0,5);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function calcCaloriasReg(reg){
  let total=0;
  // Factor suave según el peso configurado en Ajustes (referencia 70kg):
  // un cuerpo más pesado mueve más masa por repetición, así que el peso
  // sí influye en el total, sin exagerar el efecto.
  const factorPeso = 0.7 + 0.3*((state.peso||70)/70);
  (reg.ejercicios||[]).forEach(e=>{
    if(e.calentamiento) return;
    const def = state.ejercicios.find(x=>x.id===e.id);
    if(!def) return;
    total += (e.reps||0)*def.caloriasPorRep*factorPeso;
  });
  return Math.round(total*10)/10;
}

function getExercisesOrdered(){
  if(!state.rutinaOrden || state.rutinaOrden.length===0) return state.ejercicios.slice();
  const map = Object.fromEntries(state.ejercicios.map(e=>[e.id,e]));
  const ordered = state.rutinaOrden.map(id=>map[id]).filter(Boolean);
  state.ejercicios.forEach(e=>{ if(!state.rutinaOrden.includes(e.id)) ordered.push(e); });
  return ordered;
}

/* ===================== TOASTS ===================== */
function toast(msg, icono="ic-check"){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className='toast';
  el.innerHTML = `<svg class="svg-icon"><use href="#${icono}"/></svg><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(10px)'; el.style.transition='.3s'; setTimeout(()=>el.remove(),300); }, 2600);
  if(state.config.vibracion && navigator.vibrate) navigator.vibrate(15);
}

/* ===================== SONIDO (Web Audio, sin archivos) ===================== */
let actx=null;
function beep(freq=880, dur=0.09, type='sine', vol=0.06){
  if(!state.config.sonidos) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(); const g = actx.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=vol;
    o.connect(g); g.connect(actx.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
    o.stop(actx.currentTime+dur+0.02);
  }catch(e){}
}

function goTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  document.querySelectorAll('nav.tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('main').scrollTop = 0;
  renderView(tab);
}
document.getElementById('tabbar').addEventListener('click', e=>{
  const b = e.target.closest('button[data-tab]'); if(!b) return;
  goTab(b.dataset.tab);
});
(function(){
  const order = ['dashboard','calendar','training','stats','achievements','settings'];
  let sx=0, sy=0;
  document.getElementById('main').addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
  document.getElementById('main').addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx)>70 && Math.abs(dx)>Math.abs(dy)*1.5){
      const current = document.querySelector('nav.tabbar button.active').dataset.tab;
      let idx = order.indexOf(current);
      idx = dx<0 ? Math.min(idx+1, order.length-1) : Math.max(idx-1,0);
      goTab(order[idx]);
    }
  }, {passive:true});
})();

/* ===================== RACHA ===================== */
function actualizarRacha(fechaISO){
  const r = state.racha;
  if(!r.ultimaFecha){ r.actual=1; }
  else{
    const prev = new Date(r.ultimaFecha), cur = new Date(fechaISO);
    const diffDias = Math.round((cur-prev)/86400000);
    if(diffDias===0){ }
    else if(diffDias>=1 && diffDias<=1+r.diasGracia){ r.actual += 1; }
    else { r.actual = 1; }
  }
  r.ultimaFecha = fechaISO;
  r.maxima = Math.max(r.maxima, r.actual);
}
function checkRachaPerdida(){
  if(!state.racha.ultimaFecha) return;
  const prev = new Date(state.racha.ultimaFecha), hoy = new Date(todayStr());
  const diff = Math.round((hoy-prev)/86400000);
  if(diff > 1+state.racha.diasGracia && state.racha.actual>0){
    state.racha.actual = 0; saveState();
  }
}
checkRachaPerdida();

function revisarLogros(){
  ACHIEVEMENTS.forEach(a=>{
    if(!state.logros.includes(a.id) && a.check(state)){
      state.logros.push(a.id);
      toast(`Logro desbloqueado: ${a.nombre}`, a.icono);
      confetti();
      beep(1200,0.15,'triangle',0.05);
    }
  });
  saveState();
}

/* ===================== CONFETI (CSS puro) ===================== */
function confetti(){
  const cont = document.createElement('div');
  cont.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden;';
  const colors=['#FF6B35','#00D4FF','#7B2FBE','#00E676','#FFFFFF'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    const c=colors[i%colors.length];
    const left = Math.random()*100;
    const dur = 1.6+Math.random()*1.2;
    const size = 6+Math.random()*6;
    p.style.cssText=`position:absolute;top:-10px;left:${left}%;width:${size}px;height:${size}px;background:${c};opacity:.9;border-radius:${Math.random()>.5?'50%':'2px'};animation:confetti-fall ${dur}s ease-in forwards;transform:rotate(${Math.random()*360}deg)`;
    cont.appendChild(p);
  }
  document.body.appendChild(cont);
  if(!document.getElementById('confetti-style')){
    const st=document.createElement('style'); st.id='confetti-style';
    st.textContent=`@keyframes confetti-fall{to{transform:translateY(110vh) rotate(540deg);opacity:.2;}}`;
    document.head.appendChild(st);
  }
  setTimeout(()=>cont.remove(), 3000);
}

/* ===================== DASHBOARD ===================== */
function pctMes(){
  const now=new Date(); const y=now.getFullYear(), m=now.getMonth();
  const diasMes = new Date(y,m+1,0).getDate();
  const entrenados = Object.keys(state.registros).filter(f=>{
    const d=new Date(f); return d.getFullYear()===y && d.getMonth()===m;
  }).length;
  return {entrenados, diasMes, pct: Math.round((entrenados/diasMes)*100)};
}
function renderDashboard(){
  const hoy = todayStr();
  const regHoy = state.registros[hoy];
  const calHoy = regHoy? regHoy.caloriasTotales : 0;
  const metaCal = state.config.metaCalorias;
  const {entrenados, diasMes, pct} = pctMes();
  const frase = FRASES[Math.floor(Math.random()*FRASES.length)];
  const totalCaloriasHist = Object.values(state.registros).reduce((a,r)=>a+(r.caloriasTotales||0),0);
  const totalCaloriasMes = totalCaloriasMesActual(state);
  const totalEjerciciosCompletados = Object.values(state.registros).reduce((a,r)=>a+r.ejercicios.filter(e=>e.completado).length,0);
  const promedioEj = Object.keys(state.registros).length ? (totalEjerciciosCompletados/Object.keys(state.registros).length).toFixed(1) : 0;

  const ayer = todayStr(new Date(Date.now()-86400000));
  const calAyer = state.registros[ayer]?.caloriasTotales || 0;
  const diffCal = calHoy - calAyer;
  let compTxt = "";

const MOODS = [

  {v:3, nombre:"Normal", icono:"ic-face-neutral", color:"#FFC107"},
  {v:4, nombre:"Bien", icono:"ic-face-good", color:"#8BC34A"},
  {v:5, nombre:"Excelente", icono:"ic-face-great", color:"var(--success)"}
];
function moodSelectorHTML(valorActual, targetFecha){
  return `<div class="row wrap" style="gap:8px;justify-content:center" id="mood-selector">
    ${MOODS.map(m=>`
      <button class="mood-opt" data-mood="${m.v}" data-fecha="${targetFecha}"
        style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:14px;min-width:56px;
        border:2px solid ${valorActual===m.v?m.color:'var(--border)'};background:${valorActual===m.v?m.color+'22':'transparent'}">
        <svg class="svg-icon sz-32" style="stroke:${m.color}"><use href="#${m.icono}"/></svg>
        <span class="small" style="color:${valorActual===m.v?'var(--text)':'var(--text2)'}">${m.nombre}</span>
      </button>`).join('')}

}
function attachMoodHandlers(onPick){
  document.querySelectorAll('.mood-opt').forEach(b=>{
    b.addEventListener('click', ()=>{
      const fecha = b.dataset.fecha, val = parseInt(b.dataset.mood);
      ensureReg(fecha);

      saveState();

}
function ensureReg(fecha){
  if(!state.registros[fecha]){
    state.registros[fecha] = {ejercicios:[], animo:null, notas:"", timestamp:Date.now(), caloriasTotales:0};

/* ===================== CALENDARIO ===================== */
let calCursor = new Date(); calCursor.setDate(1);
function renderCalendar(){
  const y = calCursor.getFullYear(), m = calCursor.getMonth();
  const primerDiaSemana = new Date(y,m,1).getDay();
  const diasMes = new Date(y,m+1,0).getDate();
  const nombreMes = calCursor.toLocaleDateString('es-MX',{month:'long', year:'numeric'});

  let celdas = '';
  for(let i=0;i<primerDiaSemana;i++) celdas += `<div></div>`;
  for(let d=1; d<=diasMes; d++){
    const fecha = todayStr(new Date(y,m,d));
    const reg = state.registros[fecha];
    const esHoy = fecha===todayStr();
    let cls = 'cal-day'; let inner = d;
    let borde = 'var(--border)', fondo='transparent';
    if(reg && reg.ejercicios.some(e=>e.completado) && reg.animo){
      fondo='rgba(123,47,190,.18)'; borde='var(--accent3)';
      inner = `<svg class="svg-icon glow" style="stroke:var(--accent3);width:16px;height:16px"><use href="#ic-star"/></svg><span>${d}</span>`;
    } else if(reg && reg.ejercicios.some(e=>e.completado)){
      fondo='rgba(0,230,118,.15)'; borde='var(--success)';
      inner = `<svg class="svg-icon" style="stroke:var(--success);width:14px;height:14px"><use href="#ic-check"/></svg><span>${d}</span>`;
    } else if(reg && reg.animo){
      const mood = MOODS.find(x=>x.v===reg.animo);
      borde = mood.color;
      inner = `<span class="badge-dot" style="background:${mood.color}"></span><span>${d}</span>`;
    }
    celdas += `<button class="cal-day" data-fecha="${fecha}" style="
      aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
      border:1.5px solid ${borde};background:${fondo};font-weight:${esHoy?'800':'500'};font-size:.85rem;
      ${esHoy?'box-shadow:0 0 0 2px var(--accent2) inset;':''}">${inner}</button>`;
  }

  views.calendar.innerHTML = `
    <div class="card">
      <div class="row between">
        <button class="icon-btn" id="cal-prev" style="transform:rotate(-90deg)"><svg class="svg-icon"><use href="#ic-arrowup"/></svg></button>
        <div style="font-weight:800;text-transform:capitalize">${nombreMes}</div>
        <button class="icon-btn" id="cal-next" style="transform:rotate(90deg)"><svg class="svg-icon"><use href="#ic-arrowup"/></svg></button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px;text-align:center">
        ${['D','L','M','M','J','V','S'].map(d=>`<div class="muted small" style="font-weight:700">${d}</div>`).join('')}
        ${celdas}
      </div>
      <div class="row wrap mt16" style="gap:14px">
        <div class="row" style="gap:6px"><span class="badge-dot" style="background:var(--success)"></span><span class="small muted">Entrenado</span></div>
        <div class="row" style="gap:6px"><span class="badge-dot" style="background:var(--accent3)"></span><span class="small muted">Entrenado + ánimo</span></div>
        <div class="row" style="gap:6px"><span class="badge-dot" style="background:#FFC107"></span><span class="small muted">Solo ánimo</span></div>
      </div>
    </div>
  `;
  document.getElementById('cal-prev').onclick = ()=>{ calCursor.setMonth(calCursor.getMonth()-1); renderCalendar(); };
  document.getElementById('cal-next').onclick = ()=>{ calCursor.setMonth(calCursor.getMonth()+1); renderCalendar(); };
  document.querySelectorAll('.cal-day[data-fecha]').forEach(b=>{
    b.addEventListener('click', ()=>openDayModal(b.dataset.fecha));
  });
}

function openDayModal(fecha){
  const reg = state.registros[fecha] || {ejercicios:[], animo:null, notas:"", caloriasTotales:0};
  const fechaFmt = new Date(fecha+'T00:00:00').toLocaleDateString('es-MX',{weekday:'long', day:'numeric', month:'long', year:'numeric'});

    return `<div class="row between" style="padding:8px 0;border-bottom:1px solid var(--border)">

    </div>`;
  }).join('') || `<div class="muted small center" style="padding:16px 0">Sin ejercicios registrados este día</div>`;

  openModal(`

    <div class="card" style="margin-bottom:12px">
      <div class="row between">
        <span class="muted small">Calorías</span>
        <span style="font-weight:800"><svg class="svg-icon" style="width:16px;height:16px;stroke:var(--accent1);vertical-align:-3px"><use href="#ic-flame"/></svg> ${reg.caloriasTotales||0} kcal</span>
      </div>
    </div>
    <h3 style="font-size:.85rem;color:var(--text2);text-transform:uppercase;margin-bottom:8px">Ejercicios</h3>
    <div class="card">${filas}</div>
    <h3 style="font-size:.85rem;color:var(--text2);text-transform:uppercase;margin:16px 0 8px">Estado de ánimo</h3>
    ${moodSelectorHTML(reg.animo, fecha)}
    <div class="field mt16">
      <label>Notas</label>
      <textarea id="day-notes" maxlength="280" placeholder="¿Cómo te sentiste?">${reg.notas||''}</textarea>
      <div class="small muted" style="text-align:right" id="day-notes-count">${(reg.notas||'').length}/280</div>
    </div>
    <button class="btn btn-primary btn-block mt16" id="save-day-notes">Guardar</button>
  `);
  attachMoodHandlers(()=>{ toast('Ánimo actualizado','ic-check'); revisarLogros(); });
  const ta = document.getElementById('day-notes');
  ta.addEventListener('input', ()=> document.getElementById('day-notes-count').textContent = ta.value.length+'/280');
  document.getElementById('save-day-notes').onclick = ()=>{
    ensureReg(fecha);
    state.registros[fecha].notas = ta.value;
    saveState();
    toast('Notas guardadas','ic-check');
    closeModal();
    renderCalendar();
  };
}

let trainingDraft = null; // {fecha, items:{exId:{reps,tiempo,completado,calentamiento,corriendo,inicioTs,tiempoAcumulado}}}
let filtroCategoria = 'todos'; // todos|casa|gym|favoritos
let filtroBusqueda = '';
let rutinaModoRapido = false;

function ensureDraft(){
  const hoy = todayStr();
  if(!trainingDraft || trainingDraft.fecha!==hoy){
    const reg = state.registros[hoy];
    const items = {};
    (reg?.ejercicios||[]).forEach(e=>{ items[e.id] = {reps:e.reps||0, tiempo:e.tiempo||0, completado:!!e.completado, calentamiento:!!e.calentamiento, corriendo:false, inicioTs:null}; });
    trainingDraft = {fecha:hoy, items};
  }
}

function listaEjerciciosFiltrada(){
  let list = getExercisesOrdered();
  if(filtroCategoria==='favoritos') list = list.filter(e=>e.favorito);
  else if(filtroCategoria!=='todos') list = list.filter(e=>e.categoria===filtroCategoria);
  if(filtroBusqueda) list = list.filter(e=>e.nombre.toLowerCase().includes(filtroBusqueda.toLowerCase()));
  list = list.slice().sort((a,b)=> (b.favorito - a.favorito));
  if(rutinaModoRapido) list = list.slice(0,5);
  return list;
}

function fmtTiempo(s){ const m=Math.floor(s/60), sec=s%60; return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }

let timerIntervals = {};
let preCountIntervals = {};
let wakeLock = null;
async function solicitarWakeLock(){
  try{ if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }catch(e){}
}
function liberarWakeLock(){
  try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){}
}
function iniciarCronometro(id, duracion, item, display){
  if((item.tiempo||0) >= duracion) item.tiempo = 0; // ya había terminado: reinicia al arrancar de nuevo
  item.corriendo = true;
  solicitarWakeLock();
  let avisoMedio = false;
  timerIntervals[id] = setInterval(()=>{
    item.tiempo = (item.tiempo||0)+1;
    const restante = Math.max(0, duracion - item.tiempo);
    if(display) display.textContent = fmtTiempo(restante);
    if(!avisoMedio && duracion>=20 && restante===Math.floor(duracion/2)){
      avisoMedio = true;
      beep(784,0.1,'sine',0.05);
    }
    if(restante>0 && restante<=3){
      beep(660,0.08,'square',0.04);
      if(state.config.vibracion && navigator.vibrate) navigator.vibrate(20);
    }
    if(restante<=0){
      clearInterval(timerIntervals[id]);
      item.corriendo = false;
      beep(1046,0.15,'sine',0.08);
      setTimeout(()=>beep(1046,0.15,'sine',0.08),180);
      setTimeout(()=>beep(1318,0.22,'sine',0.09),380);
      if(state.config.vibracion && navigator.vibrate) navigator.vibrate([80,60,80,60,160]);
      liberarWakeLock();
      renderTraining();
    }
  },1000);
}
function wireTrainingEvents(){
  document.querySelectorAll('[data-filtro]').forEach(b=> b.onclick = ()=>{ filtroCategoria=b.dataset.filtro; renderTraining(); });
  const buscar = document.getElementById('buscar-ej');
  buscar.oninput = ()=>{ filtroBusqueda = buscar.value; };
  buscar.addEventListener('keyup', e=>{ if(e.key==='Enter') renderTraining(); });
  buscar.addEventListener('blur', renderTraining);
  document.getElementById('modo-completo').onclick = ()=>{ rutinaModoRapido=false; renderTraining(); };
  document.getElementById('modo-rapido').onclick = ()=>{ rutinaModoRapido=true; renderTraining(); };
  document.getElementById('btn-reset-dia').onclick = ()=> confirmDialog('¿Reiniciar el progreso de hoy?','Esto borrará las reps, tiempos y completados de hoy.',()=>{
    trainingDraft.items = {}; toast('Día reiniciado','ic-check'); renderTraining();
  });
  document.getElementById('btn-add-ex').onclick = ()=> openExerciseForm(null);
  document.getElementById('btn-reorder').onclick = ()=> openReorderModal();
  document.getElementById('btn-finalizar-dia').onclick = finalizarDia;

  document.querySelectorAll('.btn-ex-config').forEach(b=> b.onclick = ()=> openExerciseConfigMenu(b.dataset.id));

  document.querySelectorAll('.rep-btn').forEach(b=>{
    b.onclick = ()=>{
      const id=b.dataset.id, d=parseInt(b.dataset.delta);
      trainingDraft.items[id] = trainingDraft.items[id]||{reps:0,tiempo:0};
      trainingDraft.items[id].reps = Math.max(0,(trainingDraft.items[id].reps||0)+d);
      beep(700,0.05,'square',0.04);
      document.querySelector(`.rep-input[data-id="${id}"]`).value = trainingDraft.items[id].reps;
    };
  });
  document.querySelectorAll('.rep-input').forEach(inp=>{
    inp.onchange = ()=>{
      const id = inp.dataset.id;
      trainingDraft.items[id] = trainingDraft.items[id]||{reps:0,tiempo:0};
      trainingDraft.items[id].reps = Math.max(0, parseInt(inp.value)||0);
    };
  });
  document.querySelectorAll('.complete-switch').forEach(sw=>{
    sw.onclick = ()=>{
      const id = sw.dataset.id;
      trainingDraft.items[id] = trainingDraft.items[id]||{reps:0,tiempo:0};
      trainingDraft.items[id].completado = !trainingDraft.items[id].completado;
      sw.classList.toggle('on', trainingDraft.items[id].completado);
      if(trainingDraft.items[id].completado){ beep(1000,0.12,'sine',0.06); if(state.config.vibracion && navigator.vibrate) navigator.vibrate(25); }
    };
  });
  document.querySelectorAll('.quick-fav').forEach(b=>{
    b.onclick = ()=>{
      const id = b.dataset.id;
      filtroCategoria='todos'; filtroBusqueda='';
      renderTraining();
      setTimeout(()=>{
        const card = document.querySelector(`.ex-card[data-id="${id}"]`);
        if(card) card.scrollIntoView({behavior:'smooth', block:'center'});
      },50);
    };
  });
  document.querySelectorAll('.fav-star').forEach(b=>{
    b.onclick = (ev)=>{
      ev.stopPropagation();
      const id = b.dataset.id;
      const ex = state.ejercicios.find(x=>x.id===id);
      if(!ex) return;
      ex.favorito = !ex.favorito;
      beep(ex.favorito?900:400,0.06,'sine',0.05);
      if(state.config.vibracion && navigator.vibrate) navigator.vibrate(15);
      saveState();
      renderTraining();
    };
  });
  document.querySelectorAll('.dur-btn').forEach(b=>{
    b.onclick = ()=>{
      const id = b.dataset.id, delta = parseInt(b.dataset.delta);
      const item = trainingDraft.items[id];
      if(item && item.corriendo) return;
      const ex = state.ejercicios.find(x=>x.id===id);
      if(!ex) return;
      ex.duracionCronometro = Math.max(15, Math.min(3600, (ex.duracionCronometro||60)+delta));
      beep(700,0.04,'square',0.03);
      saveState();
      renderTraining();
    };
  });
  document.querySelectorAll('.timer-btn').forEach(btn=>{
    let holdTimeout=null, held=false;
    btn.addEventListener('pointerdown', ()=>{
      held=false;
      holdTimeout = setTimeout(()=>{
        held=true;
        const id=btn.dataset.id;
        clearInterval(timerIntervals[id]);
        clearInterval(preCountIntervals[id]);
        liberarWakeLock();
        trainingDraft.items[id] = trainingDraft.items[id]||{reps:0,tiempo:0};
        trainingDraft.items[id].tiempo = 0;
        trainingDraft.items[id].corriendo = false;
        trainingDraft.items[id].enCuentaAtras = false;
        if(state.config.vibracion && navigator.vibrate) navigator.vibrate(40);
        const ex = state.ejercicios.find(x=>x.id===id);
        const dur = ex?.duracionCronometro || 60;
        btn.closest('.ex-card').querySelector('div[style*="tabular-nums"]').textContent = fmtTiempo(dur);
        renderTraining();
      },2000);
    });
    btn.addEventListener('pointerup', ()=>{
      clearTimeout(holdTimeout);
      if(held) return;
      const id = btn.dataset.id;
      trainingDraft.items[id] = trainingDraft.items[id]||{reps:0,tiempo:0};
      const item = trainingDraft.items[id];
      const card = btn.closest('.ex-card');
      const display = card.querySelector('div[style*="tabular-nums"]');
      const ex = state.ejercicios.find(x=>x.id===id);
      const duracion = ex?.duracionCronometro || 60;

      // Si está en la precuenta 3-2-1, un toque la cancela
      if(item.enCuentaAtras){
        clearInterval(preCountIntervals[id]);
        item.enCuentaAtras = false;
        if(display) display.textContent = fmtTiempo(Math.max(0, duracion-(item.tiempo||0)));
        renderTraining();
        return;
      }

      if(!item.corriendo){
        // Precuenta 3-2-1 antes de arrancar, como el Apple Watch
        item.enCuentaAtras = true;
        let n = 3;
        if(display) display.textContent = String(n);
        beep(660,0.12,'square',0.05);
        if(state.config.vibracion && navigator.vibrate) navigator.vibrate(30);
        preCountIntervals[id] = setInterval(()=>{
          n--;
          if(n>0){
            if(display) display.textContent = String(n);
            beep(660,0.12,'square',0.05);
            if(state.config.vibracion && navigator.vibrate) navigator.vibrate(30);
          } else {
            clearInterval(preCountIntervals[id]);
            item.enCuentaAtras = false;
            beep(1046,0.18,'sine',0.08);
            if(state.config.vibracion && navigator.vibrate) navigator.vibrate(60);
            iniciarCronometro(id, duracion, item, display);
          }
        },1000);
      } else {
        item.corriendo = false;
        clearInterval(timerIntervals[id]);
        liberarWakeLock();
        beep(500,0.08,'sine',0.05);
      }
    });
    btn.addEventListener('pointerleave', ()=> clearTimeout(holdTimeout));
  });
}

function finalizarDia(){
  Object.keys(timerIntervals).forEach(id=> clearInterval(timerIntervals[id]));
  Object.keys(preCountIntervals).forEach(id=> clearInterval(preCountIntervals[id]));
  liberarWakeLock();
  const hoy = todayStr();
  ensureReg(hoy);
  const ejerciciosArr = Object.entries(trainingDraft.items).map(([id,it])=>({
    id, reps: it.reps||0, tiempo: it.tiempo||0, completado: !!it.completado, calentamiento: !!it.calentamiento,
    nota: state.ejercicios.find(e=>e.id===id)?.nota || ""
  })).filter(e=> e.reps>0 || e.tiempo>0 || e.completado);
  state.registros[hoy].ejercicios = ejerciciosArr;
  state.registros[hoy].timestamp = Date.now();
  state.registros[hoy].caloriasTotales = calcCaloriasReg(state.registros[hoy]);
  actualizarRacha(hoy);
  saveState(true);
  document.getElementById('streak-count').textContent = state.racha.actual;

  const cal = state.registros[hoy].caloriasTotales;
  const nEj = ejerciciosArr.filter(e=>e.completado).length;
  openModal(`
    <h2 class="center">¡Entrenamiento guardado! <svg class="svg-icon" style="stroke:var(--accent1);vertical-align:-4px"><use href="#ic-flame"/></svg></h2>
    <div class="card center">
      <div style="font-size:2.2rem;font-weight:800">${cal} kcal</div>
      <div class="muted small">${nEj} ejercicios completados</div>
    </div>
    <h3 style="font-size:.85rem;color:var(--text2);text-transform:uppercase;margin:16px 0 8px">¿Cómo te sentiste?</h3>
    ${moodSelectorHTML(state.registros[hoy].animo, hoy)}
    <button class="btn btn-primary btn-block mt16" id="cerrar-resumen">Listo</button>
  `);
  attachMoodHandlers(()=>{});
  document.getElementById('cerrar-resumen').onclick = ()=>{ closeModal(); revisarLogros(); renderDashboard(); };
  celebrarSiTodoCompleto(ejerciciosArr, list=>list.length>0 && list.every(e=>e.completado));
}

let statsPeriod = 30; // 7|30|90|'todo'
function cssVar(name){ return getComputedStyle(document.body).getPropertyValue(name).trim(); }

function periodDates(){
  if(statsPeriod==='todo'){
    return Object.keys(state.registros).sort();
  }
  const arr = [];
  for(let i=statsPeriod-1;i>=0;i--) arr.push(todayStr(new Date(Date.now()-i*86400000)));
  return arr;
}

function setupCanvas(canvas, cssW, cssH){
  const dpr = window.devicePixelRatio||1;
  canvas.width = Math.round(cssW*dpr); canvas.height = Math.round(cssH*dpr);
  canvas.style.width = cssW+'px'; canvas.style.height = cssH+'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return ctx;
}
function exportCanvasPNG(canvas, filename){
  const a = document.createElement('a');
  a.download = filename+'.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function drawMoodChart(){
  const canvas = document.getElementById('chart-mood'); if(!canvas) return;
  const w = canvas.parentElement.clientWidth, h = 160;
  const ctx = setupCanvas(canvas, w, h);
  const fechas = periodDates();
  const vals = fechas.map(f=> state.registros[f]?.animo ?? null);
  const pad = {l:24,r:10,t:14,b:20};
  const iw = w-pad.l-pad.r, ih = h-pad.t-pad.b;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = 'rgba(255,255,255,.08)'; ctx.lineWidth=1;
  for(let g=1;g<=5;g++){ const y = pad.t+ih-(g/5)*ih; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke(); }
  const pts = [];
  fechas.forEach((f,i)=>{
    const v = vals[i]; if(v==null) return;
    const x = pad.l + (fechas.length>1 ? i/(fechas.length-1)*iw : iw/2);
    const y = pad.t + ih - (v/5)*ih;
    pts.push([x,y]);
  });
  if(pts.length>1){
    const grad = ctx.createLinearGradient(0,pad.t,0,pad.t+ih);
    grad.addColorStop(0,'rgba(0,212,255,.35)'); grad.addColorStop(1,'rgba(0,212,255,0)');
    ctx.beginPath(); ctx.moveTo(pts[0][0], pad.t+ih);
    pts.forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.lineTo(pts[pts.length-1][0], pad.t+ih); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.strokeStyle = '#00D4FF'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke();
    pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p[0],p[1],3,0,7); ctx.fillStyle='#00D4FF'; ctx.fill(); });
  } else if(pts.length===1){
    ctx.beginPath(); ctx.arc(pts[0][0],pts[0][1],3,0,7); ctx.fillStyle='#00D4FF'; ctx.fill();
  } else {
    ctx.fillStyle = cssVar('--text2'); ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Sin registros de ánimo en este período', w/2, h/2);
  }
}

function drawCalChart(){
  const canvas = document.getElementById('chart-cal'); if(!canvas) return;
  const w = canvas.parentElement.clientWidth, h = 160;
  const ctx = setupCanvas(canvas, w, h);
  const fechas = periodDates();
  const vals = fechas.map(f=> state.registros[f]?.caloriasTotales || 0);
  const max = Math.max(1,...vals);
  const pad = {l:8,r:8,t:10,b:8};
  const iw = w-pad.l-pad.r, ih = h-pad.t-pad.b;
  ctx.clearRect(0,0,w,h);
  const bw = Math.max(2, iw/fechas.length - 3);
  fechas.forEach((f,i)=>{
    const v = vals[i]; const bh = (v/max)*ih;
    const x = pad.l + i*(iw/fechas.length);
    const grad = ctx.createLinearGradient(0,pad.t+ih-bh,0,pad.t+ih);
    grad.addColorStop(0,'#7B2FBE'); grad.addColorStop(1,'#FF6B35');
    ctx.fillStyle = v>0 ? grad : 'rgba(255,255,255,.06)';
    ctx.beginPath();
    const rad = Math.min(4,bw/2);
    ctx.roundRect ? ctx.roundRect(x, pad.t+ih-bh, bw, Math.max(bh,2), [rad,rad,0,0]) : ctx.rect(x,pad.t+ih-bh,bw,Math.max(bh,2));
    ctx.fill();
  });
}

function drawTopChart(){
  const canvas = document.getElementById('chart-top'); if(!canvas) return;
  const fechas = periodDates();
  const conteo = {};
  fechas.forEach(f=>{
    const reg = state.registros[f]; if(!reg) return;
    reg.ejercicios.forEach(e=>{ if(e.completado || e.reps>0) conteo[e.id] = (conteo[e.id]||0) + (e.reps||1); });
  });
  const top = Object.entries(conteo).sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([id,val])=>({def: state.ejercicios.find(e=>e.id===id), val}))
    .filter(x=>x.def);
  const h = Math.max(120, top.length*38+20);
  const w = canvas.parentElement.clientWidth;
  const ctx = setupCanvas(canvas, w, h);
  ctx.clearRect(0,0,w,h);
  if(top.length===0){
    ctx.fillStyle = cssVar('--text2'); ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Aún no hay datos suficientes', w/2, h/2);
    return;
  }
  const max = Math.max(...top.map(t=>t.val));
  const labelW = 96, pad = 10;
  top.forEach((t,i)=>{
    const y = 20 + i*38;
    ctx.fillStyle = cssVar('--text'); ctx.font='12px sans-serif'; ctx.textAlign='left';
    ctx.fillText(t.def.nombre.length>13? t.def.nombre.slice(0,12)+'…':t.def.nombre, 0, y-2);
    const barMaxW = w - labelW - pad;
    const bw = Math.max(4,(t.val/max)*barMaxW);
    const grad = ctx.createLinearGradient(labelW,0,labelW+bw,0);
    grad.addColorStop(0,'#FF6B35'); grad.addColorStop(1,'#00D4FF');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(labelW, y, bw, 16, 8) : ctx.rect(labelW,y,bw,16);
    ctx.fill();
    ctx.fillStyle = cssVar('--text'); ctx.font='11px sans-serif'; ctx.textAlign='left';
    ctx.fillText(String(t.val), labelW+bw+6, y+12);
  });
}

function drawWeekChart(){
  const canvas = document.getElementById('chart-week'); if(!canvas) return;
  const w = canvas.parentElement.clientWidth, h = 160;
  const ctx = setupCanvas(canvas, w, h);
  const fechas = periodDates();
  const dias = [0,0,0,0,0,0,0]; // Dom..Sab
  fechas.forEach(f=>{
    const reg = state.registros[f];
    if(reg && reg.ejercicios.some(e=>e.completado)){
      const dow = new Date(f+'T00:00:00').getDay();
      dias[dow]++;
    }
  });
  const max = Math.max(1,...dias);
  const pad = {l:8,r:8,t:10,b:20};
  const iw = w-pad.l-pad.r, ih = h-pad.t-pad.b;
  ctx.clearRect(0,0,w,h);
  const labels = ['D','L','M','M','J','V','S'];
  const bw = iw/7 - 10;
  dias.forEach((v,i)=>{
    const bh = (v/max)*ih;
    const x = pad.l + i*(iw/7) + 5;
    const grad = ctx.createLinearGradient(0,pad.t+ih-bh,0,pad.t+ih);
    grad.addColorStop(0,'#00D4FF'); grad.addColorStop(1,'#7B2FBE');
    ctx.fillStyle = v>0?grad:'rgba(255,255,255,.06)';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x, pad.t+ih-bh, bw, Math.max(bh,2), [4,4,0,0]) : ctx.rect(x,pad.t+ih-bh,bw,Math.max(bh,2));
    ctx.fill();
    ctx.fillStyle = cssVar('--text2'); ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(labels[i], x+bw/2, h-4);
  });
}

function wireSettingsEvents(){
  const c = state.config;
  document.getElementById('set-peso').onchange = e=>{
    const v = parseFloat(e.target.value);
    if(!v || v<=0){ toast('Ingresa un peso válido','ic-question'); renderSettings(); return; }
    state.peso = c.unidadPeso==='lbs' ? Math.round((v/2.20462)*10)/10 : Math.round(v*10)/10;
    saveState();
  };
  document.querySelectorAll('[data-unidad]').forEach(b=> b.onclick=()=>{
    c.unidadPeso = b.dataset.unidad; saveState(); renderSettings();
  });
  document.getElementById('set-metacal').onchange = e=>{ c.metaCalorias = Math.max(1,parseInt(e.target.value)||200); saveState(); };
  document.getElementById('set-metaej').onchange = e=>{ c.metaEjercicios = Math.max(1,parseInt(e.target.value)||8); saveState(); };
  document.getElementById('set-metadias').onchange = e=>{ c.metaDiasSemana = Math.min(7,Math.max(1,parseInt(e.target.value)||5)); saveState(); };
  document.querySelectorAll('[data-gracia]').forEach(b=> b.onclick=()=>{
    state.racha.diasGracia = +b.dataset.gracia; saveState(); renderSettings(); toast('Días de gracia actualizados');
  });
  document.getElementById('set-recordatorio').onchange = e=>{
    c.recordatorioHora = e.target.value; saveState();
    if(c.recordatorioHora) solicitarPermisoNotif();
  };
  document.getElementById('set-sonidos').onclick = ()=>{ c.sonidos=!c.sonidos; saveState(); renderSettings(); };
  document.getElementById('set-vibracion').onclick = ()=>{ c.vibracion=!c.vibracion; saveState(); renderSettings(); };
  document.querySelectorAll('[data-tema]').forEach(b=> b.onclick=()=>{ c.tema=b.dataset.tema; applyTheme(); saveState(); renderSettings(); });
  document.querySelectorAll('[data-font]').forEach(b=> b.onclick=()=>{ c.fontSize=b.dataset.font; applyTheme(); saveState(); renderSettings(); });
  document.querySelectorAll('[data-fecha]').forEach(b=> b.onclick=()=>{ c.formatoFecha=b.dataset.fecha; saveState(); renderSettings(); });

  document.getElementById('btn-exportar-json').onclick = exportarJSON;
  document.getElementById('btn-exportar-csv').onclick = exportarCSV;
  document.getElementById('btn-importar-json').onclick = ()=> document.getElementById('file-importar').click();
  document.getElementById('file-importar').onchange = e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=> previsualizarImportacion(reader.result);
    reader.readAsText(file);
    e.target.value='';
  };
  document.querySelectorAll('[data-restaurar]').forEach(b=> b.onclick=()=>{
    const idx = +b.dataset.restaurar;
    confirmDialog('¿Restaurar este respaldo?','Reemplazará tus registros y racha actuales por los de este respaldo.',()=>{
      const bkp = state.respaldos[idx];
      state.registros = JSON.parse(JSON.stringify(bkp.datos.registros));
      state.racha = JSON.parse(JSON.stringify(bkp.datos.racha));
      checkRachaPerdida(); saveState();
      document.getElementById('streak-count').textContent = state.racha.actual;
      toast('Respaldo restaurado','ic-check'); renderSettings();
    });
  });
  document.getElementById('btn-reset-todo').onclick = ()=>{
    confirmDialog('¿Restablecer todo?','Se borrarán TODOS tus datos: ejercicios, registros, racha y logros.',()=>{
      confirmDialog('Última confirmación','Esta acción no se puede deshacer. ¿De verdad quieres continuar?',()=>{
        localStorage.removeItem(STORAGE_KEY);
        state = defaultState();
        saveState();
        applyTheme();
        document.getElementById('streak-count').textContent = state.racha.actual;
        toast('Todo restablecido','ic-check');
        goTab('dashboard');
      });
    });
  };
  document.getElementById('btn-ayuda').onclick = abrirAyuda;
}

function exportarJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `forja_backup_${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
  toast('Datos exportados','ic-download');
}

function exportarCSV(){
  const filas = [['fecha','animo','notas','caloriasTotales','ejerciciosCompletados','detalleEjercicios']];
  Object.keys(state.registros).sort().forEach(f=>{
    const r = state.registros[f];
    const detalle = (r.ejercicios||[]).map(e=>{
      const def = state.ejercicios.find(x=>x.id===e.id);
      return `${def?def.nombre:e.id}: ${e.reps||0} reps / ${e.tiempo||0}s`;
    }).join(' | ');
    filas.push([f, r.animo??'', (r.notas||'').replace(/[\r\n]+/g,' '), r.caloriasTotales||0, (r.ejercicios||[]).filter(e=>e.completado).length, detalle]);
  });
  const csv = filas.map(fila=> fila.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `forja_datos_${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
  toast('CSV exportado','ic-download');
}

function previsualizarImportacion(jsonText){
  let data;
  try{ data = JSON.parse(jsonText); }catch(e){ toast('Ese archivo no es un JSON válido','ic-question'); return; }
  if(!data || typeof data!=='object' || !data.registros){ toast('El archivo no tiene el formato esperado','ic-question'); return; }
  const nDias = Object.keys(data.registros||{}).length;
  const nEj = (data.ejercicios||[]).length;
  openModal(`
    <h2>Vista previa de importación</h2>
    <div class="card">
      <div class="row between"><span class="muted">Días registrados</span><b>${nDias}</b></div>
      <div class="row between mt8"><span class="muted">Ejercicios</span><b>${nEj}</b></div>
      <div class="row between mt8"><span class="muted">Racha guardada</span><b>${(data.racha&&data.racha.actual)||0} días</b></div>
    </div>
    <div class="small muted mt16">Esto <b>reemplazará todos tus datos actuales</b>. Si quieres conservarlos, exporta un respaldo antes de continuar.</div>
    <div class="row mt16" style="gap:10px">
      <button class="btn btn-outline btn-block" id="import-cancel">Cancelar</button>
      <button class="btn btn-danger btn-block" id="import-ok">Reemplazar datos</button>
    </div>
  `);
  document.getElementById('import-cancel').onclick = closeModal;
  document.getElementById('import-ok').onclick = ()=>{
    state = Object.assign(defaultState(), data, {config:Object.assign(defaultState().config, data.config||{})});
    checkRachaPerdida();
    saveState();
    applyTheme();
    document.getElementById('streak-count').textContent = state.racha.actual;
    closeModal();
    toast('Datos importados','ic-check');
    revisarLogros();
    goTab('dashboard');
  };
}

function abrirAyuda(){
  openModal(`
    <h2>Ayuda rápida</h2>
    <div class="field"><b>Cronómetro</b><div class="small muted">Es cuenta regresiva. Ajusta la duración con −15s/+15s o desde el engrane, toca el círculo y espera la cuenta 3-2-1 antes de arrancar, tócalo de nuevo para pausar, y mantenlo presionado 2 segundos para reiniciarlo. Avisa a la mitad y en los últimos 3 segundos, y mantiene la pantalla encendida mientras corre.</div></div>
    <div class="field"><b>Favoritos</b><div class="small muted">Toca la estrella junto al nombre del ejercicio para marcarlo como favorito. Tus favoritos aparecen en "Inicio rápido" hasta arriba de Entrenar para empezar de un toque.</div></div>
    <div class="field"><b>Racha</b><div class="small muted">Completa al menos un ejercicio marcado como terminado cada día para mantenerla viva. Los días de gracia te dan margen si un día no entrenas.</div></div>
    <div class="field"><b>Calorías</b><div class="small muted">Cada ejercicio tiene un valor de kcal por repetición o por segundo. Los ejercicios marcados como calentamiento no suman calorías.</div></div>
    <div class="field"><b>Logros</b><div class="small muted">Se desbloquean solos al cumplir la condición. Entra a la pestaña Logros para ver cuáles te faltan.</div></div>
    <div class="field mb0"><b>Modo flexible vs. estructurado</b><div class="small muted">Flexible te deja completar los ejercicios en cualquier orden; estructurado respeta el orden de la lista.</div></div>
    <button class="btn btn-primary btn-block mt16" id="ayuda-cerrar">Entendido</button>
  `);
  document.getElementById('ayuda-cerrar').onclick = closeModal;
}

/* ===== Recordatorio diario (Notification API, sin backend) ===== */
function solicitarPermisoNotif(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}
let ultimoRecordatorioDia = null;
function revisarRecordatorio(){
  const hora = state.config.recordatorioHora;
  if(!hora) return;
  const ahora = new Date();
  const hhmm = String(ahora.getHours()).padStart(2,'0')+':'+String(ahora.getMinutes()).padStart(2,'0');
  const hoy = todayStr();
  if(hhmm===hora && ultimoRecordatorioDia!==hoy){
    ultimoRecordatorioDia = hoy;
    if('Notification' in window && Notification.permission==='granted'){
      new Notification('FORJA', {body:'Hora de entrenar. No rompas tu racha.'});
    } else {
      toast('Hora de entrenar. No rompas tu racha','ic-flame');
    }
  }
}
setInterval(revisarRecordatorio, 20000);

function renderView(tab){
  if(tab==='dashboard') renderDashboard();
  if(tab==='calendar' && typeof renderCalendar==='function') renderCalendar();
  if(tab==='training' && typeof renderTraining==='function') renderTraining();
  if(tab==='stats' && typeof renderStats==='function') renderStats();
  if(tab==='achievements' && typeof renderAchievements==='function') renderAchievements();
  if(tab==='settings' && typeof renderSettings==='function') renderSettings();
}


/* ===================== INICIO ===================== */
applyTheme();
document.getElementById('streak-count').textContent = state.racha.actual;
renderDashboard();
</script>
